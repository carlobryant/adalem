name: adalem
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.2
  fl_chart: ^1.2.0
  redacted: ^1.0.13
  provider: ^6.1.5+1
  flutter_svg: ^2.2.3
  firebase_ai: ^3.9.0
  image_picker: ^1.2.1
  dotted_border: ^3.1.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.1.4
  file_picker: ^10.3.10
  google_sign_in: ^7.2.0
  toastification: ^3.0.3
  cloud_firestore: ^6.1.2
  super_sliver_list: ^0.4.1
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1
  flutter_markdown_plus: ^1.0.7
  flutter_launcher_icons: ^0.14.4
  flutter_heatmap_calendar: ^1.0.5
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets: 
    - assets/
  fonts:
  - family: GoogleSans
    fonts:
    - asset: assets/GoogleSans-VariableFont_GRAD,opsz,wght.ttf
  - family: LoveYaLikeASister
    fonts:
    - asset: assets/LoveYaLikeASister-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/adalem.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_foreground_inset: 0
  web:
    generate: true
    image_path: "assets/adalem.png"
    background_color: "#1b5e20"
    theme_color: "#66bb6a"
  windows:
    generate: true
    image_path: "assets/adalem.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/adalem.png"
